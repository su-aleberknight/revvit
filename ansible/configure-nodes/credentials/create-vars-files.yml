---
# Creates all vars files required by credentials from their .example counterparts.
# Existing files are never overwritten — safe to run at any time.
#
# Usage:
#   ansible-playbook credentials/create-vars-files.yml -i inventory

- name: Create credentials vars files
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Create vars files from examples
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ item | regex_replace('\\.example$', '') }}"
        force: false
      loop:
        - vars/nvidia-secret.yml.example
        - vars/appco-secret.yml.example
        - vars/rancher-suse-repos.yml.example
