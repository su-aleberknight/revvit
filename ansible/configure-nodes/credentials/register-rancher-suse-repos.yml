---
# Registers the SUSE Registry (registry.suse.com) as a repository in Rancher Manager's
# Apps & Marketplace (catalog.cattle.io/ClusterRepo).
#
# Requires:
#   1. A docker-registry credential secret in the cattle-system namespace
#   2. A ClusterRepo resource that references the secret and the OCI URL
#
# Secret is created with --dry-run=client | kubectl apply so the play is idempotent.

- name: Create Rancher SUSE registry secret and ClusterRepo
  hosts: rke2_bootstrap
  become: true
  vars_files:
    - vars/rancher-suse-repos.yml
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
    PATH: "/var/lib/rancher/rke2/bin:{{ ansible_env.PATH }}"

  pre_tasks:
    - name: Validate required variables are defined
      ansible.builtin.fail:
        msg: |
          ERROR: Missing required variables.

          Usage:
            ansible-playbook credentials/register-rancher-suse-repos.yml [-i inventory]

          Required vars file (credentials/vars/rancher-suse-repos.yml):
            Run: ansible-playbook credentials/secret-preflight-checks.yml

          File contents:
            rancher_suse_registry_repo:
              name: "suse-registry"
              url: "oci://registry.suse.com"
              username: "your-scc-email@example.com"
              password: "your-scc-registration-code"
              secret_name: "suse-registry-rancher-secret"
      when: rancher_suse_registry_repo is not defined

  tasks:
    - name: Create credential secret for SUSE Registry
      ansible.builtin.shell:
        cmd: >
          kubectl create secret docker-registry {{ rancher_suse_registry_repo.secret_name | quote }}
          --docker-server=registry.suse.com
          --docker-username={{ rancher_suse_registry_repo.username | quote }}
          --docker-password={{ rancher_suse_registry_repo.password | quote }}
          --namespace=cattle-system
          --dry-run=client -o yaml | kubectl apply -f -
      register: result
      changed_when: "'configured' in result.stdout or 'created' in result.stdout"

    - name: Apply SUSE Registry ClusterRepo manifest
      ansible.builtin.template:
        src: ../templates/rancher-cluster-repo.yaml.j2
        dest: /tmp/rancher-suse-registry-repo.yaml
        mode: "0600"
      vars:
        repo: "{{ rancher_suse_registry_repo }}"

    - name: Register SUSE Registry in Rancher
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/rancher-suse-registry-repo.yaml
      register: result
      changed_when: "'configured' in result.stdout or 'created' in result.stdout"

    - name: Show registered repositories
      ansible.builtin.command:
        cmd: kubectl get clusterrepos
      register: repos_output
      changed_when: false

    - name: Print repository summary
      ansible.builtin.debug:
        msg: "{{ repos_output.stdout_lines }}"
