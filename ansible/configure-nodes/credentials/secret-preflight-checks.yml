---
# Prompts for SCC credentials and writes them into credentials/vars/rancher-suse-repos.yml.
# Both repos (Application Collections and SUSE Registry) use the same SCC email and
# registration code, so the user is only prompted once.
#
# Run this before run-rancher-manager-plays.yml or any time credentials need updating.
# Existing values in the file are overwritten.

- name: Rancher secrets preflight check
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Prompt for SCC email
      ansible.builtin.pause:
        prompt: "Enter your SUSE account email"
      register: scc_email_input

    - name: Prompt for SCC registration code
      ansible.builtin.pause:
        prompt: "Enter your SCC registration code"
      register: scc_reg_code_input

    - name: Write credentials to vars/rancher-suse-repos.yml
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/vars/rancher-suse-repos.yml"
        mode: "0600"
        content: |
          ---
          rancher_appco_repo:
            name: "suse-application-collections"
            url: "oci://registry.suse.com/application-collections/charts"
            username: "{{ scc_email_input.user_input }}"
            password: "{{ scc_reg_code_input.user_input }}"
            secret_name: "suse-appco-rancher-secret"

          rancher_suse_registry_repo:
            name: "suse-registry"
            url: "oci://registry.suse.com"
            username: "{{ scc_email_input.user_input }}"
            password: "{{ scc_reg_code_input.user_input }}"
            secret_name: "suse-registry-rancher-secret"
