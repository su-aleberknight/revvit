---
# Prompts for all credentials and writes them into their respective vars files.
# Existing values are overwritten — run any time credentials need updating.
#
# Creates:
#   credentials/vars/rancher-suse-repos.yml  — SCC credentials for Rancher ClusterRepos
#   credentials/vars/appco-secret.yml        — SCC credentials for SUSE AppCo pull secret
#   credentials/vars/nvidia-secret.yml       — NGC API key for NVIDIA registry pull secret

- name: Credentials preflight check
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Prompt for SCC email
      ansible.builtin.pause:
        prompt: "Enter your SUSE account email"
      register: scc_email_input

    - name: Prompt for SCC registration code
      ansible.builtin.pause:
        prompt: "Enter your SCC registration code"
      register: scc_reg_code_input

    - name: Prompt for NGC API key
      ansible.builtin.pause:
        prompt: "Enter your NVIDIA NGC API key"
      register: ngc_api_key_input

    - name: Write rancher-suse-repos.yml
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/vars/rancher-suse-repos.yml"
        mode: "0600"
        content: |
          ---
          rancher_suse_registry_repo:
            name: "suse-registry"
            url: "oci://registry.suse.com"
            username: "{{ scc_email_input.user_input }}"
            password: "{{ scc_reg_code_input.user_input }}"
            secret_name: "suse-registry-rancher-secret"

    - name: Write appco-secret.yml
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/vars/appco-secret.yml"
        mode: "0600"
        content: |
          ---
          suse_appco:
            username: "{{ scc_email_input.user_input }}"
            password: "{{ scc_reg_code_input.user_input }}"
            secret_name: "suse-appco-secret"
            namespace: "gpu-operator"

    - name: Write nvidia-secret.yml
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/vars/nvidia-secret.yml"
        mode: "0600"
        content: |
          ---
          nvidia_registry:
            username: "$oauthtoken"
            password: "{{ ngc_api_key_input.user_input }}"
            secret_name: "nvidia-registry-secret"
            namespace: "gpu-operator"
