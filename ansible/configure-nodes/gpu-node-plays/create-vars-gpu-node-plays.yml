---
# Creates all vars files required by gpu-node-plays from their .example counterparts.
# Existing files are never overwritten — safe to run at any time.
#
# Usage:
#   ansible-playbook gpu-node-plays/create-vars-gpu-node-plays.yml -i inventory

- name: Create gpu-node-plays vars files
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Create vars files from examples
      ansible.builtin.copy:
        src: "vars/{{ item }}"
        dest: "vars/{{ item | regex_replace('\\.example$', '') }}"
        force: false
      loop:
        - generate-nvidia-gpu-operator.yml.example
        - gpu-node-nvidia-operator-managed.yml.example
        - gpu-node-nvidia-user-managed-postboot.yml.example
