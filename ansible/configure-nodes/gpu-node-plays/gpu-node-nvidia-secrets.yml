---
# Creates Kubernetes docker-registry pull secrets for NVIDIA workloads.
#
# Always created:
#   - NVIDIA NGC (nvcr.io) — for pulling NGC images
#
# Optional — created only when suse_appco is defined in the vars file:
#   - SUSE AppCo (registry.suse.com) — for the operator-managed NVIDIA driver image
#
# Secrets are created with --dry-run=client | kubectl apply so the play is idempotent.

- name: Create NVIDIA registry secrets
  hosts: rke2_bootstrap
  become: true
  vars_files:
    - vars/gpu-node-nvidia-secrets.yml
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
    PATH: "/var/lib/rancher/rke2/bin:{{ ansible_env.PATH }}"

  pre_tasks:
    - name: Validate required variables are defined
      ansible.builtin.fail:
        msg: |
          ERROR: Missing required variables.

          Usage:
            ansible-playbook gpu-node-nvidia-secrets.yml [-i inventory]

          Required vars file (vars/gpu-node-nvidia-secrets.yml):
            cp vars/gpu-node-nvidia-secrets.yml.example vars/gpu-node-nvidia-secrets.yml
            # then edit vars/gpu-node-nvidia-secrets.yml

          File contents:
            nvidia_registry:
              username: "$oauthtoken"
              password: "your-ngc-api-key"
              secret_name: "nvidia-registry-secret"
              namespace: "gpu-operator"
            # suse_appco is optional — include to also create the AppCo secret
            # suse_appco:
            #   username: "your-appco-email@example.com"
            #   password: "your-appco-account-token"
            #   secret_name: "suse-appco-secret"
            #   namespace: "gpu-operator"
      when: nvidia_registry is not defined

  tasks:
    # -------------------------------------------------------------------------
    # NVIDIA NGC — always created
    # -------------------------------------------------------------------------
    - name: Ensure namespace exists for NVIDIA registry secret
      ansible.builtin.command:
        cmd: kubectl create namespace {{ nvidia_registry.namespace | quote }}
      register: ns_result
      failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr
      changed_when: ns_result.rc == 0

    - name: Create NVIDIA NGC pull secret
      ansible.builtin.shell:
        cmd: >
          kubectl create secret docker-registry {{ nvidia_registry.secret_name | quote }}
          --docker-server=nvcr.io
          --docker-username={{ nvidia_registry.username | quote }}
          --docker-password={{ nvidia_registry.password | quote }}
          --namespace={{ nvidia_registry.namespace | quote }}
          --dry-run=client -o yaml | kubectl apply -f -
      register: result
      changed_when: "'configured' in result.stdout or 'created' in result.stdout"

    # -------------------------------------------------------------------------
    # SUSE AppCo — optional, created only when suse_appco is defined
    # -------------------------------------------------------------------------
    - name: Ensure namespace exists for AppCo secret
      ansible.builtin.command:
        cmd: kubectl create namespace {{ suse_appco.namespace | quote }}
      register: ns_result
      failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr
      changed_when: ns_result.rc == 0
      when: suse_appco is defined

    - name: Create SUSE AppCo pull secret (managed GPU operator)
      ansible.builtin.shell:
        cmd: >
          kubectl create secret docker-registry {{ suse_appco.secret_name | quote }}
          --docker-server=registry.suse.com
          --docker-username={{ suse_appco.username | quote }}
          --docker-password={{ suse_appco.password | quote }}
          --namespace={{ suse_appco.namespace | quote }}
          --dry-run=client -o yaml | kubectl apply -f -
      register: result
      changed_when: "'configured' in result.stdout or 'created' in result.stdout"
      when: suse_appco is defined

    - name: Show created secrets
      ansible.builtin.command:
        cmd: kubectl get secrets -A --field-selector type=kubernetes.io/dockerconfigjson
      register: secrets_output
      changed_when: false

    - name: Print secrets summary
      ansible.builtin.debug:
        msg: "{{ secrets_output.stdout_lines }}"
