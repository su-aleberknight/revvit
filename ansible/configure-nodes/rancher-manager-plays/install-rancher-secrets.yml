---
# Registers SUSE Application Collections and SUSE Registry Server as repositories
# in Rancher Manager's Apps & Marketplace (catalog.cattle.io/ClusterRepo).
#
# Each repository requires:
#   1. A docker-registry credential secret in the cattle-system namespace
#   2. A ClusterRepo resource that references the secret and the OCI URL
#
# Secrets are created with --dry-run=client | kubectl apply so the play is idempotent.

- name: Create Rancher repository secrets and ClusterRepo resources
  hosts: rke2_bootstrap
  become: true
  vars_files:
    - vars/install-rancher-secrets.yml
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
    PATH: "/var/lib/rancher/rke2/bin:{{ ansible_env.PATH }}"

  pre_tasks:
    - name: Validate required variables are defined
      ansible.builtin.fail:
        msg: |
          ERROR: Missing required variables.

          Usage:
            ansible-playbook install-rancher-secrets.yml [-i inventory]

          Required vars file (vars/install-rancher-secrets.yml):
            cp vars/install-rancher-secrets.yml.example vars/install-rancher-secrets.yml
            # then edit vars/install-rancher-secrets.yml

          File contents:
            rancher_appco_repo:
              name: "suse-application-collections"
              url: "oci://registry.suse.com/application-collections/charts"
              username: "your-scc-email@example.com"
              password: "your-scc-registration-code"
              secret_name: "suse-appco-rancher-secret"
            rancher_suse_registry_repo:
              name: "suse-registry"
              url: "oci://registry.suse.com"
              username: "your-scc-email@example.com"
              password: "your-scc-registration-code"
              secret_name: "suse-registry-rancher-secret"
      when: >
        rancher_appco_repo is not defined or
        rancher_suse_registry_repo is not defined

  tasks:
    # -------------------------------------------------------------------------
    # SUSE Application Collections
    # -------------------------------------------------------------------------
    - name: Create credential secret for SUSE Application Collections
      ansible.builtin.shell:
        cmd: >
          kubectl create secret docker-registry {{ rancher_appco_repo.secret_name | quote }}
          --docker-server=registry.suse.com
          --docker-username={{ rancher_appco_repo.username | quote }}
          --docker-password={{ rancher_appco_repo.password | quote }}
          --namespace=cattle-system
          --dry-run=client -o yaml | kubectl apply -f -
      register: result
      changed_when: "'configured' in result.stdout or 'created' in result.stdout"

    - name: Apply SUSE Application Collections ClusterRepo
      ansible.builtin.template:
        src: ../templates/rancher-cluster-repo.yaml.j2
        dest: /tmp/rancher-appco-repo.yaml
        mode: "0600"
      vars:
        repo: "{{ rancher_appco_repo }}"

    - name: Register SUSE Application Collections in Rancher
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/rancher-appco-repo.yaml
      register: result
      changed_when: "'configured' in result.stdout or 'created' in result.stdout"

    # -------------------------------------------------------------------------
    # SUSE Registry Server
    # -------------------------------------------------------------------------
    - name: Create credential secret for SUSE Registry Server
      ansible.builtin.shell:
        cmd: >
          kubectl create secret docker-registry {{ rancher_suse_registry_repo.secret_name | quote }}
          --docker-server=registry.suse.com
          --docker-username={{ rancher_suse_registry_repo.username | quote }}
          --docker-password={{ rancher_suse_registry_repo.password | quote }}
          --namespace=cattle-system
          --dry-run=client -o yaml | kubectl apply -f -
      register: result
      changed_when: "'configured' in result.stdout or 'created' in result.stdout"

    - name: Apply SUSE Registry Server ClusterRepo manifest
      ansible.builtin.template:
        src: ../templates/rancher-cluster-repo.yaml.j2
        dest: /tmp/rancher-suse-registry-repo.yaml
        mode: "0600"
      vars:
        repo: "{{ rancher_suse_registry_repo }}"

    - name: Register SUSE Registry Server in Rancher
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/rancher-suse-registry-repo.yaml
      register: result
      changed_when: "'configured' in result.stdout or 'created' in result.stdout"

    - name: Show registered repositories
      ansible.builtin.command:
        cmd: kubectl get clusterrepos
      register: repos_output
      changed_when: false

    - name: Print repository summary
      ansible.builtin.debug:
        msg: "{{ repos_output.stdout_lines }}"
