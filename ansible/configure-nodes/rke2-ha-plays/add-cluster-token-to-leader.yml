---
# Reads the cluster token generated by RKE2 on the leader node and writes it
# into /etc/rancher/rke2/config.yaml.
#
# Run this after install-rke2-on-leader.yml and before create-control-plane.yml.
# The token is required in config.yaml so control plane nodes can authenticate
# when joining the cluster.

- name: Add cluster token to leader node config
  hosts: rke2_bootstrap
  become: true
  gather_facts: false
  any_errors_fatal: true

  tasks:
    - name: Read cluster token from leader node
      ansible.builtin.slurp:
        src: /var/lib/rancher/rke2/server/token
      register: rke2_token_file

    - name: Set token fact
      ansible.builtin.set_fact:
        rke2_cluster_token: "{{ rke2_token_file.content | b64decode | trim }}"

    - name: Update token in RKE2 config
      ansible.builtin.lineinfile:
        path: /etc/rancher/rke2/config.yaml
        regexp: '^token:'
        line: "token: {{ rke2_cluster_token }}"
        create: false

- name: Confirm token before proceeding
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Display token written to leader node config
      ansible.builtin.debug:
        msg:
          - "Token has been written to /etc/rancher/rke2/config.yaml on the leader node."
          - "To verify on the leader node, run:"
          - "  grep '^token:' /etc/rancher/rke2/config.yaml"

    - name: Prompt user to confirm token is correct
      ansible.builtin.pause:
        prompt: "Is the token correct? [yes/no]"
      register: token_confirmation

    - name: Abort if token not confirmed
      ansible.builtin.fail:
        msg: "Token not confirmed — aborting. Correct the token in /etc/rancher/rke2/config.yaml on the leader node and re-run."
      when: token_confirmation.user_input | lower != 'yes'
