---
# Configures and joins worker nodes to the cluster.
# Reads the cluster token from the leader node, deploys the RKE2 config,
# and starts the rke2-agent service.
#
# Run install-rke2-on-worker-nodes.yml first.
#
# Inventory groups required:
#   [rke2_bootstrap]    - leader node (token source)
#   [rke2-worker-nodes] - worker nodes to attach

- name: Validate variables
  hosts: rke2-worker-nodes
  gather_facts: false
  vars_files:
    - vars/install-rke2-worker-nodes.yml

  tasks:
    - name: Validate required variables are defined
      ansible.builtin.fail:
        msg: |
          ERROR: Missing required variables.

          Required vars file (vars/install-rke2-worker-nodes.yml):
            cp vars/install-rke2-worker-nodes.yml.example vars/install-rke2-worker-nodes.yml

          File contents:
            rke2_version: "v1.34.3+rke2r3"
      run_once: true
      when: rke2_version is not defined or rke2_version | length == 0

- name: Read cluster token from leader node
  hosts: rke2_bootstrap
  become: true
  gather_facts: false

  tasks:
    - name: Read cluster token
      ansible.builtin.slurp:
        src: /var/lib/rancher/rke2/server/token
      register: rke2_token_file

    - name: Set token fact
      ansible.builtin.set_fact:
        rke2_cluster_token: "{{ rke2_token_file.content | b64decode | trim }}"

- name: Attach worker nodes to cluster
  hosts: rke2-worker-nodes
  become: true
  vars_files:
    - vars/install-rke2-worker-nodes.yml
  vars:
    rke2_token: "{{ hostvars[groups['rke2_bootstrap'][0]]['rke2_cluster_token'] }}"
    rke2_vip_ip: "{{ hostvars[groups['vip'][0]]['ansible_host'] }}"

  tasks:
    - name: Skip if no worker nodes defined in inventory
      ansible.builtin.meta: end_play
      when: groups['rke2-worker-nodes'] | default([]) | length == 0

    - name: Create RKE2 config directory
      ansible.builtin.file:
        path: /etc/rancher/rke2
        state: directory
        mode: "0700"

    - name: Deploy RKE2 worker config
      ansible.builtin.template:
        src: ../templates/rke2-worker-config.yaml.j2
        dest: /etc/rancher/rke2/config.yaml
        mode: "0600"

    - name: Enable rke2-agent service
      ansible.builtin.systemd:
        name: rke2-agent
        enabled: true

    - name: Start rke2-agent service
      ansible.builtin.systemd:
        name: rke2-agent
        state: started
