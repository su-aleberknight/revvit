---
# Inventory group required:
#   [rke2-control-nodes]  - nodes 2 and 3 only
#
# Run install-rke2-on-leader.yml first and wait for it to complete
# before running this playbook. Secondary servers join via the bootstrap node's
# real IP — the VIP handles traffic once all three servers are up.

- name: Validate variables
  hosts: rke2-control-nodes
  gather_facts: false
  vars_files:
    - vars/create-control-plane.yml

  tasks:
    - name: Validate required variables are defined
      ansible.builtin.fail:
        msg: |
          ERROR: Missing required variables.

          Usage:
            ansible-playbook create-control-plane.yml [-i inventory]

          Required vars file (vars/create-control-plane.yml):
            cp vars/create-control-plane.yml.example vars/create-control-plane.yml
            # then edit vars/create-control-plane.yml

          Required inventory groups:
            [rke2_bootstrap]   <- node 1 only
            [rke2-control-nodes]     <- nodes 2 and 3 only

          File contents:
            rke2_version: "v1.34.3+rke2r3"
            rke2_token: "your-shared-secret-here"
      run_once: true
      when: >
        rke2_token is not defined or rke2_token | length == 0 or
        rke2_version is not defined or rke2_version | length == 0

- name: Attach control plane nodes
  hosts: rke2-control-nodes
  become: true
  vars_files:
    - vars/create-control-plane.yml
  vars:
    rke2_is_bootstrap: false
    rke2_vip_ip: "{{ hostvars[groups['vip'][0]]['ansible_host'] }}"
    rke2_vip_hostname: "{{ groups['vip'][0] }}"

  tasks:
    - name: Check vip_interface environment variable is set
      ansible.builtin.shell:
        cmd: grep -q '^vip_interface=' /etc/environment && grep -v '^vip_interface=$' /etc/environment | grep -q '^vip_interface='
      register: vip_interface_check
      changed_when: false
      failed_when: false
      when: use_vip | default(true) | bool

    - name: Abort if vip_interface is not set and use_vip is not false
      ansible.builtin.fail:
        msg: |
          ERROR: vip_interface environment variable is not set on {{ inventory_hostname }}.
          Run create-vip-interface-env-var.yml before this playbook, or set use_vip: false
          in vars/create-control-plane.yml to skip this check.
      when:
        - use_vip | default(true) | bool
        - vip_interface_check.rc != 0

    - name: Create RKE2 config directory
      ansible.builtin.file:
        path: /etc/rancher/rke2
        state: directory
        mode: "0700"

    - name: Deploy RKE2 config
      ansible.builtin.template:
        src: ../templates/rke2-config.yaml.j2
        dest: /etc/rancher/rke2/config.yaml
        mode: "0600"

    - name: Install RKE2
      ansible.builtin.shell:
        cmd: curl -sfL https://get.rke2.io | INSTALL_RKE2_VERSION={{ rke2_version | quote }} sh -
      args:
        creates: /usr/local/bin/rke2

    - name: Enable rke2-server service
      ansible.builtin.systemd:
        name: rke2-server
        enabled: true

    - name: Start rke2-server service
      ansible.builtin.systemd:
        name: rke2-server
        state: started
