---
# Deploys kube-vip as a static pod on all server nodes (bootstrap + secondary).
# kube-vip claims the VIP across all three servers, providing HA for the API server.
#
# Run this BEFORE starting rke2-server on any node so the manifest is in place
# when the kubelet initialises. The kubelet watches the pod-manifests directory
# and will start kube-vip immediately when rke2-server comes up.
#
# Run order:
#   1. install-lb-for-api-server-ha.yml          <- this file
#   2. install-rke2-leader-node.yml
#   3. create-control-plane.yml

- name: Validate variables
  hosts: rke2_bootstrap:rke2-control-nodes
  gather_facts: false
  vars_files:
    - vars/install-lb-for-api-server-ha.yml

  tasks:
    - name: Validate required variables are defined
      ansible.builtin.fail:
        msg: |
          ERROR: Missing required variables.

          Usage:
            ansible-playbook install-lb-for-api-server-ha.yml [-i inventory]

          Required vars file (vars/install-lb-for-api-server-ha.yml):
            cp vars/install-lb-for-api-server-ha.yml.example vars/install-lb-for-api-server-ha.yml
            # then edit vars/install-lb-for-api-server-ha.yml

          Required inventory groups:
            [rke2_bootstrap]   <- node 1 only
            [rke2-control-nodes]     <- nodes 2 and 3 only

          File contents:
            kube_vip_version: "v0.8.9"
      run_once: true
      when: >
        kube_vip_version is not defined or kube_vip_version | length == 0

- name: Deploy kube-vip on all server nodes
  hosts: rke2_bootstrap:rke2-control-nodes
  become: true
  vars_files:
    - vars/install-lb-for-api-server-ha.yml
  vars:
    rke2_vip_ip: "{{ hostvars[groups['vip'][0]]['ansible_host'] }}"
    rke2_vip_hostname: "{{ groups['vip'][0] }}"

  tasks:
    - name: Detect interface name for node IP
      ansible.builtin.shell:
        cmd: ip -o addr show | awk '$4 ~ /^{{ ansible_host }}\// {print $2; exit}'
      register: detected_interface
      changed_when: false

    - name: Abort if interface could not be detected
      ansible.builtin.fail:
        msg: "ERROR: Could not detect network interface for {{ ansible_host }} on {{ inventory_hostname }}."
      when: detected_interface.stdout | length == 0

    - name: Set kube_vip_interface
      ansible.builtin.set_fact:
        kube_vip_interface: "{{ detected_interface.stdout }}"

    - name: Show interface being used
      ansible.builtin.debug:
        msg: "Binding VIP {{ rke2_vip_ip }} to interface {{ kube_vip_interface }} on {{ inventory_hostname }}"

    - name: Create kube-vip static pod manifests directory
      ansible.builtin.file:
        path: /var/lib/rancher/rke2/agent/pod-manifests
        state: directory
        mode: "0700"

    - name: Deploy kube-vip static pod manifest
      ansible.builtin.template:
        src: ../templates/kube-vip-api-server-ha.yaml.j2
        dest: /var/lib/rancher/rke2/agent/pod-manifests/kube-vip.yaml
        mode: "0600"
