---
# Installs the RKE2 agent binary on all worker nodes.
# Does not start the service or join the cluster — run attach-workers.yml after this.
#
# Inventory group required:
#   [rke2-worker-nodes]

- name: Validate variables
  hosts: rke2-worker-nodes
  gather_facts: false
  vars_files:
    - vars/install-rke2-worker-nodes.yml

  tasks:
    - name: Validate required variables are defined
      ansible.builtin.fail:
        msg: |
          ERROR: Missing required variables.

          Usage:
            ansible-playbook install-rke2-on-worker-nodes.yml [-i inventory]

          Required vars file (vars/install-rke2-worker-nodes.yml):
            cp vars/install-rke2-worker-nodes.yml.example vars/install-rke2-worker-nodes.yml
            # then edit vars/install-rke2-worker-nodes.yml

          Required inventory group:
            [rke2-worker-nodes]

          File contents:
            rke2_version: "v1.34.3+rke2r3"
      run_once: true
      when: rke2_version is not defined or rke2_version | length == 0

- name: Install RKE2 on worker nodes
  hosts: rke2-worker-nodes
  become: true
  vars_files:
    - vars/install-rke2-worker-nodes.yml

  tasks:
    - name: Skip if no worker nodes defined in inventory
      ansible.builtin.meta: end_play
      when: groups['rke2-worker-nodes'] | default([]) | length == 0

    - name: Install RKE2 worker
      ansible.builtin.shell:
        cmd: curl -sfL https://get.rke2.io | INSTALL_RKE2_TYPE=agent INSTALL_RKE2_VERSION={{ rke2_version | quote }} sh -
      args:
        creates: /usr/local/bin/rke2
