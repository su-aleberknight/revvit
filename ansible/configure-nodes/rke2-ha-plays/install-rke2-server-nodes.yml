---
# Inventory group required:
#   [rke2_servers]  - nodes 2 and 3 only
#
# Run install-rke2-bootstrap-node.yml first and wait for it to complete
# before running this playbook. Secondary servers join via the bootstrap node's
# real IP — the VIP handles traffic once all three servers are up.

- name: Validate variables
  hosts: rke2_servers
  gather_facts: false
  vars_files:
    - vars/install-rke2-server-nodes.yml

  tasks:
    - name: Validate required variables are defined
      ansible.builtin.fail:
        msg: |
          ERROR: Missing required variables.

          Usage:
            ansible-playbook install-rke2-server-nodes.yml [-i inventory]

          Required vars file (vars/install-rke2-server-nodes.yml):
            cp vars/install-rke2-server-nodes.yml.example vars/install-rke2-server-nodes.yml
            # then edit vars/install-rke2-server-nodes.yml

          Required inventory groups:
            [rke2_bootstrap]   <- node 1 only
            [rke2_servers]     <- nodes 2 and 3 only

          File contents:
            rke2_version: "v1.34.3+rke2r3"
            rke2_token: "your-shared-secret-here"
            rke2_vip_ip: "192.168.1.100"
            rke2_vip_hostname: "rke2.example.local"
      run_once: true
      when: >
        rke2_token is not defined or rke2_token | length == 0 or
        rke2_vip_ip is not defined or
        rke2_vip_hostname is not defined or
        rke2_version is not defined or rke2_version | length == 0

- name: Join server nodes 2 and 3
  hosts: rke2_servers
  become: true
  vars_files:
    - vars/install-rke2-server-nodes.yml
  vars:
    rke2_is_bootstrap: false

  tasks:
    - name: Create RKE2 config directory
      ansible.builtin.file:
        path: /etc/rancher/rke2
        state: directory
        mode: "0700"

    - name: Deploy RKE2 config
      ansible.builtin.template:
        src: ../templates/rke2-config.yaml.j2
        dest: /etc/rancher/rke2/config.yaml
        mode: "0600"

    - name: Install RKE2
      ansible.builtin.shell:
        cmd: curl -sfL https://get.rke2.io | INSTALL_RKE2_VERSION={{ rke2_version | quote }} sh -
      args:
        creates: /usr/local/bin/rke2

    - name: Enable rke2-server service
      ansible.builtin.systemd:
        name: rke2-server
        enabled: true

    - name: Start rke2-server service
      ansible.builtin.systemd:
        name: rke2-server
        state: started
