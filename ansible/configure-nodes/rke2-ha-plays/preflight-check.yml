---
# Prints all variable settings required for the rke2-ha-plays and prompts for confirmation.
# Abort run-rke2-ha-plays.yml by answering 'no' at the prompt.

- name: RKE2 HA preflight check
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Create vars files from examples if they do not exist
      ansible.builtin.copy:
        src: "vars/{{ item }}.example"
        dest: "vars/{{ item }}"
        force: false
      loop:
        - suseconnect.yml
        - install-lb-for-api-server-ha.yml
        - install-rke2-leader-node.yml
        - create-control-plane.yml
        - install-rke2-agent-nodes.yml
        - configure-etc-hosts.yml

    - name: Load vars files
      ansible.builtin.include_vars:
        file: "vars/{{ item }}"
      loop:
        - suseconnect.yml
        - install-lb-for-api-server-ha.yml
        - install-rke2-leader-node.yml
        - create-control-plane.yml
        - install-rke2-agent-nodes.yml
        - configure-etc-hosts.yml

    - name: Display settings
      ansible.builtin.debug:
        msg:
          - "============================================"
          - " RKE2 HA Cluster — Preflight Check"
          - "============================================"
          - ""
          - "--- Inventory ---"
          - "Bootstrap node:    {{ groups['rke2_bootstrap'] | map('extract', hostvars, 'ansible_host') | list }}"
          - "Leader node:       {{ groups['rke2-leader-node'] | map('extract', hostvars, 'ansible_host') | list }}"
          - "Control nodes:     {{ groups['rke2-control-nodes'] | map('extract', hostvars, 'ansible_host') | list }}"
          - "Worker nodes:      {{ groups['rke2-worker-nodes'] | default([]) | map('extract', hostvars, 'ansible_host') | list }}"
          - "VIP:               {{ hostvars[groups['vip'][0]]['ansible_host'] }} ({{ groups['vip'][0] }})"
          - ""
          - "--- SUSE Registration ---"
          - "Email:             {{ suse_email | default('NOT SET') }}"
          - "Subscription:      {{ suse_subscription_number | default('NOT SET') }}"
          - ""
          - "--- RKE2 ---"
          - "Version:           {{ rke2_version | default('NOT SET') }}"
          - "Token:             {{ rke2_token | default('NOT SET') }}"
          - ""
          - "--- kube-vip ---"
          - "Version:           {{ kube_vip_version | default('NOT SET') }}"
          - ""
          - "--- /etc/hosts ---"
          - "DNS mode:          {{ dns | default(true) }}"
          - "  (if true, /etc/hosts will not be written)"
          - "============================================"

    - name: Prompt user to confirm settings
      ansible.builtin.pause:
        prompt: "Are the settings above correct? [yes/no]"
      register: user_confirmation

    - name: Abort if user did not confirm
      ansible.builtin.fail:
        msg: "Preflight check rejected by user — aborting run-rke2-ha-plays.yml."
      when: user_confirmation.user_input | lower != 'yes'
