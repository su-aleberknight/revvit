---
# Removes RKE2 from all control plane nodes.
# Run this to fully reset [rke2-server-nodes] before re-running create-control-plane.yml.

- name: Reset control plane nodes
  hosts: rke2-server-nodes
  become: true

  tasks:
    - name: Run RKE2 killall script
      ansible.builtin.shell:
        cmd: /opt/rke2/bin/rke2-killall.sh
      args:
        removes: /opt/rke2/bin/rke2-killall.sh
      failed_when: false

    - name: Run RKE2 uninstall script
      ansible.builtin.shell:
        cmd: /opt/rke2/bin/rke2-uninstall.sh
      args:
        removes: /opt/rke2/bin/rke2-uninstall.sh

    - name: Remove RKE2 config directory
      ansible.builtin.file:
        path: /etc/rancher/rke2
        state: absent

    - name: Remove RKE2 data directory
      ansible.builtin.file:
        path: /var/lib/rancher/rke2
        state: absent

    - name: Remove vip_interface from /etc/environment
      ansible.builtin.lineinfile:
        path: /etc/environment
        regexp: '^vip_interface='
        state: absent
