---
# Creates all vars files required by rke2-singlenode-plays from their .example counterparts.
# Existing files are never overwritten — safe to run at any time.
#
# Usage:
#   ansible-playbook rke2-singlenode-plays/create-vars-rke2-singlenode-plays.yml -i inventory

- name: Create rke2-singlenode-plays vars files
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Create vars files from examples
      ansible.builtin.copy:
        src: "vars/{{ item }}"
        dest: "vars/{{ item | regex_replace('\\.example$', '') }}"
        force: false
      loop:
        - suseconnect.yml.example
        - install-rke2-singlenode.yml.example
