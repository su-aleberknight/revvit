---
# Installs RKE2 on a single node (non-HA, no etcd cluster, no kube-vip).
# Use this for dev/test environments or single-node deployments.
#
# Inventory group required:
#   [rke2_standalone]  - single node only

- name: Validate variables
  hosts: rke2_standalone
  gather_facts: false
  vars_files:
    - vars/install-rke2-singlenode.yml

  tasks:
    - name: Validate required variables are defined
      ansible.builtin.fail:
        msg: |
          ERROR: Missing required variables.

          Usage:
            ansible-playbook install-rke2-singlenode.yml [-i inventory]

          Required vars file (vars/install-rke2-singlenode.yml):
            cp vars/install-rke2-singlenode.yml.example vars/install-rke2-singlenode.yml
            # then edit vars/install-rke2-singlenode.yml

          Required inventory group:
            [rke2_standalone]   <- single node only

          File contents:
            rke2_version: "v1.34.3+rke2r3"
            rke2_node_ip: "192.168.1.10"
      when: >
        rke2_version is not defined or rke2_version | length == 0 or
        rke2_node_ip is not defined or rke2_node_ip | length == 0

- name: Install RKE2 standalone
  hosts: rke2_standalone
  become: true
  vars_files:
    - vars/install-rke2-singlenode.yml

  tasks:
    - name: Create RKE2 config directory
      ansible.builtin.file:
        path: /etc/rancher/rke2
        state: directory
        mode: "0700"

    - name: Deploy RKE2 config
      ansible.builtin.copy:
        dest: /etc/rancher/rke2/config.yaml
        mode: "0600"
        content: |
          tls-san:
            - {{ rke2_node_ip }}

    - name: Install RKE2
      ansible.builtin.shell:
        cmd: curl -sfL https://get.rke2.io | INSTALL_RKE2_VERSION={{ rke2_version | quote }} sh -
      args:
        creates: /usr/local/bin/rke2

    - name: Enable rke2-server service
      ansible.builtin.systemd:
        name: rke2-server
        enabled: true

    - name: Start rke2-server service
      ansible.builtin.systemd:
        name: rke2-server
        state: started

    - name: Wait for RKE2 API to be ready
      ansible.builtin.wait_for:
        host: "{{ rke2_node_ip }}"
        port: 6443
        timeout: 120

    - name: Show node status
      ansible.builtin.command:
        cmd: kubectl get nodes
      environment:
        KUBECONFIG: /etc/rancher/rke2/rke2.yaml
        PATH: "/var/lib/rancher/rke2/bin:{{ ansible_env.PATH }}"
      register: nodes_output
      changed_when: false

    - name: Print node status
      ansible.builtin.debug:
        msg: "{{ nodes_output.stdout_lines }}"
