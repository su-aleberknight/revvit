---
# Installs open-iscsi on SLES nodes, required by Longhorn for iSCSI volume support.
#
# Usage:
#   ansible-playbook iscsi-check.yml -i ../inventory

- name: check open-iscsi
  hosts: rke2-storage-nodes
  become: true

  tasks:
    - name: check open-iscsi (SLES only)
      ansible.builtin.command:
        cmd: zypper install -y --auto-agree-with-licenses open-iscsi
      register: iscsi_result
      changed_when: "'already installed' not in iscsi_result.stdout"
      when: ansible_distribution == "SLES"
